<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINZO AI | Intelligence Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-color: #ffffff;
            --chat-bg: #f4f4f7;
            --accent-color: #2563eb;
            --text-main: #1a1a1a;
            --text-secondary: #6b7280;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Message Bubbles */
        .ai-bubble {
            background: transparent;
            border: none;
        }

        .user-bubble {
            background: var(--chat-bg);
            border-radius: 20px;
            padding: 12px 20px;
            max-width: 85%;
        }

        /* Input Bar */
        .input-wrapper {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 4px 25px rgba(37, 99, 235, 0.1);
        }

        /* Custom Scrollbar */
        #chatDisplay::-webkit-scrollbar { width: 6px; }
        #chatDisplay::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-msg { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-14 flex items-center justify-between px-6 border-b border-gray-100 bg-white/80 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-brain text-white text-sm"></i>
            </div>
            <h1 class="font-bold text-lg tracking-tight">MINZO <span class="text-blue-600">AI</span></h1>
        </div>
        <div class="flex items-center gap-4 text-gray-400">
            <span class="text-[10px] font-bold uppercase tracking-widest text-green-500">Live Uplink</span>
            <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-xs font-bold text-gray-600 cursor-pointer hover:bg-gray-200">M</div>
        </div>
    </header>

    <main id="chatDisplay" class="flex-1 overflow-y-auto px-4 md:px-0 bg-white">
        <div class="max-w-3xl mx-auto py-10 space-y-10">
            
            <div class="flex gap-4 ai-bubble animate-msg">
                <div class="w-8 h-8 shrink-0 rounded-full bg-blue-50 flex items-center justify-center">
                    <i class="fas fa-robot text-blue-600 text-xs"></i>
                </div>
                <div class="space-y-1">
                    <p class="text-sm font-semibold text-gray-900">MINZO AI</p>
                    <div class="text-[15px] leading-relaxed text-gray-700">
                        Hello, Commander **MINZO-PRIME**. How can I assist you today? I am ready for analysis, coding, or real-time data retrieval.
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="p-4 md:p-8 bg-white">
        <div class="max-w-3xl mx-auto">
            <div class="input-wrapper flex items-end p-2 pb-3">
                <textarea id="userInput" rows="1" 
                    class="flex-1 bg-transparent border-none focus:ring-0 p-3 text-[15px] text-gray-800 placeholder-gray-400 resize-none overflow-hidden" 
                    placeholder="Message MINZO AI..."
                    oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                
                <button id="sendBtn" class="w-10 h-10 mb-0.5 mr-1 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-all flex items-center justify-center shadow-lg shadow-blue-500/20 disabled:bg-gray-300">
                    <i class="fas fa-arrow-up text-sm"></i>
                </button>
            </div>
            <div class="mt-3 flex justify-center items-center gap-4">
                <p class="text-[10px] text-gray-400 font-medium uppercase tracking-widest">Powered by MINZO-PRIME WEB-CORE v7.0</p>
            </div>
        </div>
    </footer>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        const input = document.getElementById("userInput");
        const display = document.getElementById("chatDisplay").firstElementChild;
        const scrollArea = document.getElementById("chatDisplay");
        const btn = document.getElementById("sendBtn");

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            // User Bubble
            display.innerHTML += `
                <div class="flex justify-end animate-msg">
                    <div class="user-bubble">
                        <p class="text-[15px] text-gray-800 leading-relaxed">${text}</p>
                    </div>
                </div>`;
            
            input.value = "";
            input.style.height = "auto";
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin text-sm"></i>';
            scrollArea.scrollTop = scrollArea.scrollHeight;

            try {
                const client = await Client.connect("minzo456/minzo-AI");
                const result = await client.predict("/chat_engine", { message: text });
                
                const reply = Array.isArray(result.data) ? result.data[0] : result.data;

                // AI Response
                display.innerHTML += `
                    <div class="flex gap-4 ai-bubble animate-msg">
                        <div class="w-8 h-8 shrink-0 rounded-full bg-blue-50 flex items-center justify-center">
                            <i class="fas fa-robot text-blue-600 text-xs"></i>
                        </div>
                        <div class="space-y-1 w-full">
                            <p class="text-sm font-semibold text-gray-900">MINZO AI</p>
                            <div class="text-[15px] leading-relaxed text-gray-700 prose prose-slate max-w-none">
                                ${reply.replace(/\n/g, '<br>')}
                            </div>
                        </div>
                    </div>`;
            } catch (err) {
                display.innerHTML += `<p class="text-center text-xs text-red-500 py-4">⚠️ Uplink Error: ${err.message}</p>`;
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-arrow-up text-sm"></i>';
            scrollArea.scrollTop = scrollArea.scrollHeight;
        }

        btn.addEventListener("click", sendMessage);
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
